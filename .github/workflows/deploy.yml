name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: huskypark-rg
  LOCATION: eastus
  CONTAINER_APP_NAME: huskypark-api
  REGISTRY: huskypark.azurecr.io

jobs:
  infrastructure:
    name: Provision Azure resources
    runs-on: ubuntu-latest
    outputs:
      api_url: ${{ steps.deploy.outputs.apiUrl }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        id: deploy
        uses: azure/arm-deploy@v2
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: infra/parameters.json
          failOnStdErr: false

  build-and-push:
    name: Build & push backend image
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name huskypark

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ env.REGISTRY }}/huskypark-api:${{ github.sha }},${{ env.REGISTRY }}/huskypark-api:latest

  deploy-backend:
    name: Update Container App
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update image
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/huskypark-api:${{ github.sha }}

  deploy-frontend:
    name: Deploy frontend to Static Web Apps
    runs-on: ubuntu-latest
    needs: infrastructure

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ needs.infrastructure.outputs.api_url }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: dist
